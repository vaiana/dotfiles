# Reference: https://github.com/i3/i3/blob/next/etc/config

start-at-login = true

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
    # start a terminal (matches i3: $mod+Return exec alacritty)
    alt-enter = 'exec-and-forget open -na Alacritty'

    # kill focused window (matches i3: $mod+Shift+q kill)
    alt-shift-q = 'close'

    # i3 wraps focus by default
    alt-j =         'focus --boundaries-action wrap-around-the-workspace left'
    alt-k =         'focus --boundaries-action wrap-around-the-workspace down'
    alt-l =         'focus --boundaries-action wrap-around-the-workspace up'
    alt-semicolon = 'focus --boundaries-action wrap-around-the-workspace right'

    # move focused window
    alt-shift-j = 'move left'
    alt-shift-k = 'move down'
    alt-shift-l = 'move up'
    alt-shift-semicolon = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    alt-h = 'split horizontal'
    alt-v = 'split vertical'

    alt-f = 'fullscreen'

    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #alt-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # alt-a = 'focus parent'

    # switch to workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 10'

    # move focused container to workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-0 = 'move-node-to-workspace 10'

    # screenshots (mirrors i3: $mod+s=select, $mod+Shift+s=full, $mod+Mod4+s=window)
    alt-s       = 'exec-and-forget ~/.local/bin/screenshot select'
    alt-shift-s = 'exec-and-forget ~/.local/bin/screenshot'
    alt-cmd-s   = 'exec-and-forget ~/.local/bin/screenshot window'

    # linkr fuzzy picker (matches i3: $mod+i exec rofi linkr)
    alt-i = 'exec-and-forget ~/.local/bin/linkr-pick'

    # Type Bitwarden master password. Uses alt-shift-p (not alt-p as on i3)
    # because cliclick types while the modifier may still be held, and alt-p
    # produces "π" — shift-p avoids collision with a system character.
    alt-shift-p = 'exec-and-forget ~/.local/bin/bw-type-password'

    alt-shift-c = 'reload-config'

    alt-r = 'mode resize'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

# Workspace 1: Brave Home (personal)
# Brave Home is /Applications/Brave Home.app — a rebranded copy of Brave
# Browser.app with bundle id com.brave.Browser.home and a wrapper script that
# bakes in --user-data-dir for the Brave-Browser-Home profile. Built and
# refreshed (after Brave Stable updates) by ~/.local/bin/rebuild-brave-home.
[[on-window-detected]]
    if.app-id = 'com.brave.Browser.home'
    run = ['move-node-to-workspace 1']

# Workspace 2: Brave Stable (work)
# Stable is the system default browser, so clicked links open here. Distinct
# bundle id from Brave Home means AeroSpace can auto-route them to different
# workspaces. Mirrors the Linux setup where --class=brave-work separates
# instances.
[[on-window-detected]]
    if.app-id = 'com.brave.Browser'
    run = ['move-node-to-workspace 2']

# Workspace 3: Alacritty
[[on-window-detected]]
    if.app-id = 'org.alacritty'
    run = ['move-node-to-workspace 3']

# Workspace 4: Slack
[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = ['move-node-to-workspace 4']

# Workspace 5: Discord + Zoom
[[on-window-detected]]
    if.app-id = 'com.hnc.Discord'
    run = ['move-node-to-workspace 5']

[[on-window-detected]]
    if.app-id = 'us.zoom.xos'
    run = ['move-node-to-workspace 5']

# Workspace 7: Cursor + REAPER
[[on-window-detected]]
    if.app-id = 'com.todesktop.230313mzl4w4u92'
    run = ['move-node-to-workspace 7']

[[on-window-detected]]
    if.app-id = 'com.cockos.reaper'
    run = ['move-node-to-workspace 7']

# Workspace 8: Zotero
[[on-window-detected]]
    if.app-id = 'org.zotero.zotero'
    run = ['move-node-to-workspace 8']

# Workspace 9: Linear

[[on-window-detected]]
    if.app-id = 'com.linear'
    run = ['move-node-to-workspace 9']
    
[[on-window-detected]]
    if.app-id = 'com.electron.universal-launcher'
    run = ['layout floating']
