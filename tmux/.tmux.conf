set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g status-style 'bg=#333333 fg=#5eacd3'

bind r source-file ~/.tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'


# tmux sessionizer from ThePrimagen
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind -r h neww "nvim ~/work/reflect/2026-reflections.md"
bind -r j neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/work/manage/todo.md"
bind -r k neww "nvim ~/work/rocks/2026-q1"
bind -r i neww  "nvim ~/dotfiles/linkr/.config/linkr/config"
