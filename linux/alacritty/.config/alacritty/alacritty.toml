[window]
opacity = 0.9

# Ctrl+number switches tmux windows.
# Sends custom escape sequences that tmux binds to select-window via user-keys.
[[keyboard.bindings]]
key = "1"
mods = "Control"
chars = "\u001b[101~"

[[keyboard.bindings]]
key = "2"
mods = "Control"
chars = "\u001b[102~"

[[keyboard.bindings]]
key = "3"
mods = "Control"
chars = "\u001b[103~"

[[keyboard.bindings]]
key = "4"
mods = "Control"
chars = "\u001b[104~"

[[keyboard.bindings]]
key = "5"
mods = "Control"
chars = "\u001b[105~"

[[keyboard.bindings]]
key = "6"
mods = "Control"
chars = "\u001b[106~"

[[keyboard.bindings]]
key = "7"
mods = "Control"
chars = "\u001b[107~"

[[keyboard.bindings]]
key = "8"
mods = "Control"
chars = "\u001b[108~"

[[keyboard.bindings]]
key = "9"
mods = "Control"
chars = "\u001b[109~"

[[keyboard.bindings]]
key = "0"
mods = "Control"
chars = "\u001b[110~"

# Ctrl+Shift+K enters tmux copy mode (sends prefix + [)
[[keyboard.bindings]]
key = "K"
mods = "Control|Shift"
chars = "\u0001["

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
