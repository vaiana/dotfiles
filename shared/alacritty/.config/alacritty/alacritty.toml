[window]
opacity = 0.9

# Send Ctrl+a when Cmd+a is pressed so tmux prefix works naturally on Mac
[[keyboard.bindings]]
key = "A"
mods = "Command"
chars = "\u0001"

# Cmd+number (Mac) / Ctrl+number (Linux) switches tmux windows
# Sends custom escape sequences that tmux binds to select-window
[[keyboard.bindings]]
key = "1"
mods = "Command"
chars = "\u001b[101~"

[[keyboard.bindings]]
key = "2"
mods = "Command"
chars = "\u001b[102~"

[[keyboard.bindings]]
key = "3"
mods = "Command"
chars = "\u001b[103~"

[[keyboard.bindings]]
key = "4"
mods = "Command"
chars = "\u001b[104~"

[[keyboard.bindings]]
key = "5"
mods = "Command"
chars = "\u001b[105~"

[[keyboard.bindings]]
key = "6"
mods = "Command"
chars = "\u001b[106~"

[[keyboard.bindings]]
key = "7"
mods = "Command"
chars = "\u001b[107~"

[[keyboard.bindings]]
key = "8"
mods = "Command"
chars = "\u001b[108~"

[[keyboard.bindings]]
key = "9"
mods = "Command"
chars = "\u001b[109~"

[[keyboard.bindings]]
key = "0"
mods = "Command"
chars = "\u001b[110~"

[[keyboard.bindings]]
key = "1"
mods = "Control"
chars = "\u001b[101~"

[[keyboard.bindings]]
key = "2"
